<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找不到頁面</title>
  <meta name="description" content="此頁面不存在，請返回首頁。" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: #fff;
    }

    .card {
      width: min(560px, 100%);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.24);
    }

    .status {
      display: inline-block;
      margin-bottom: 16px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 12px;
    }

    p {
      font-size: 1.02rem;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.92);
    }

    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .btn-primary {
      background: #fff;
      color: #1d4ed8;
    }

    .btn-secondary {
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="status">ERROR 404</div>
    <h1>找不到這個頁面</h1>
    <p>
      你要查看的內容可能已被移動、刪除，或網址輸入錯誤。
      可以回到首頁，重新查看黃國昌老師介紹頁面。
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="index.html">回到首頁</a>
      <a class="btn btn-secondary" href="javascript:history.back()">返回上一頁</a>
    </div>
  </main>
</body>
</html>
